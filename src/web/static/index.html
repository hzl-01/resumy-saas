<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>resumy</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <div id="error-msg"></div>

    <div id="view-login" class="view card">
      <h1>登录</h1>
      <p class="sub">resumy · 在线简历制作</p>
      <div class="form-group">
        <label for="login-email">邮箱</label>
        <input id="login-email" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="login-password">密码</label>
        <input id="login-password" type="password" placeholder="输入密码">
      </div>
      <button id="login-btn" class="btn btn-primary">登录</button>
      <div class="footer-link">
        没有账号？<a id="goto-register">注册</a>
      </div>
    </div>

    <div id="view-register" class="view card">
      <h1>注册</h1>
      <p class="sub">创建一个 resumy 账号</p>
      <div class="form-group">
        <label for="reg-name">姓名</label>
        <input id="reg-name" type="text" placeholder="你的名字">
      </div>
      <div class="form-group">
        <label for="reg-email">邮箱</label>
        <input id="reg-email" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="reg-password">密码</label>
        <input id="reg-password" type="password" placeholder="至少 6 位">
      </div>
      <button id="register-btn" class="btn btn-primary">注册</button>
      <div class="footer-link">
        已有账号？<a id="goto-login">登录</a>
      </div>
    </div>

    <div id="view-dashboard" class="view card">
      <div class="dashboard-header">
        <h1>你好，<span id="user-name"></span></h1>
        <button id="logout-btn" class="btn btn-danger">退出</button>
      </div>
      <p style="color:#888;font-size:14px;text-align:center;padding:32px 0;">
        简历管理功能即将上线
      </p>
    </div>
  </div>

  <script src="/static/spa-utils.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
