<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>resumy</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <div id="error-msg"></div>

    <div id="view-login" class="view card">
      <h1>登录</h1>
      <p class="sub">resumy · 在线简历制作</p>
      <div class="form-group">
        <label for="login-email">邮箱</label>
        <input id="login-email" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="login-password">密码</label>
        <input id="login-password" type="password" placeholder="输入密码">
      </div>
      <button id="login-btn" class="btn btn-primary">登录</button>
      <div class="footer-link">没有账号？<a id="goto-register">注册</a></div>
    </div>

    <div id="view-register" class="view card">
      <h1>注册</h1>
      <p class="sub">创建一个 resumy 账号</p>
      <div class="form-group">
        <label for="reg-name">姓名</label>
        <input id="reg-name" type="text" placeholder="你的名字">
      </div>
      <div class="form-group">
        <label for="reg-email">邮箱</label>
        <input id="reg-email" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="reg-password">密码</label>
        <input id="reg-password" type="password" placeholder="至少 6 位">
      </div>
      <button id="register-btn" class="btn btn-primary">注册</button>
      <div class="footer-link">已有账号？<a id="goto-login">登录</a></div>
    </div>

    <div id="view-dashboard" class="view card">
      <div class="dashboard-header">
        <h1>你好，<span id="user-name"></span></h1>
        <button id="logout-btn" class="btn btn-danger">退出</button>
      </div>
      <div id="resume-list"></div>
      <button id="new-resume-btn" class="btn btn-primary" style="margin-top:16px">+ 新建简历</button>
    </div>

    <div id="view-editor" class="view card">
      <div class="dashboard-header">
        <h1 id="editor-title">编辑简历</h1>
        <div>
          <button id="editor-back-btn" class="btn" style="width:auto;padding:8px 16px;font-size:13px;background:#eee;margin-right:8px">返回</button>
          <button id="editor-save-btn" class="btn btn-primary" style="width:auto;padding:8px 16px;font-size:13px">保存</button>
        </div>
      </div>
      <div id="editor-loading" style="text-align:center;padding:32px;color:#888">加载中...</div>
      <div id="editor-form" style="display:none">
        <h2 class="section-title">基本信息</h2>
        <div class="form-group"><label>姓名</label><input id="ed-name" type="text"></div>
        <div class="form-group"><label>标题</label><input id="ed-title" type="text"></div>
        <div class="form-group"><label>邮箱</label><input id="ed-email" type="email"></div>
        <div class="form-group"><label>电话</label><input id="ed-phone" type="text"></div>
        <div class="form-group"><label>地址</label><input id="ed-location" type="text"></div>
        <div class="form-group"><label>网站</label><input id="ed-website" type="text"></div>
        <div class="form-group"><label>简介</label><textarea id="ed-summary" rows="3"></textarea></div>

        <h2 class="section-title">工作经历</h2>
        <div id="ed-experience"></div>
        <button class="btn btn-secondary add-btn" data-section="experience">+ 添加工作经历</button>

        <h2 class="section-title">教育经历</h2>
        <div id="ed-education"></div>
        <button class="btn btn-secondary add-btn" data-section="education">+ 添加教育经历</button>

        <h2 class="section-title">项目</h2>
        <div id="ed-projects"></div>
        <button class="btn btn-secondary add-btn" data-section="projects">+ 添加项目</button>

        <h2 class="section-title">技能</h2>
        <div id="ed-skills"></div>
        <button class="btn btn-secondary add-btn" data-section="skills">+ 添加技能组</button>

        <h2 class="section-title">自定义板块</h2>
        <div id="ed-custom"></div>
        <button class="btn btn-secondary add-btn" data-section="custom">+ 添加自定义板块</button>

        <button id="editor-delete-btn" class="btn btn-danger" style="margin-top:24px;width:auto;padding:8px 16px;font-size:13px">删除此简历</button>

        <h2 class="section-title">生成 PDF</h2>
        <div class="pdf-gen-panel">
          <div class="form-row">
            <div class="form-group">
              <label>模板</label>
              <select id="pdf-template"><option value="professional">Professional</option><option value="minimal">Minimal</option><option value="classic">Classic</option></select>
            </div>
            <div class="form-group">
              <label>纸张</label>
              <select id="pdf-pagesize"><option value="letter">Letter</option><option value="a4">A4</option></select>
            </div>
          </div>
          <button id="pdf-generate-btn" class="btn btn-primary" style="width:auto;padding:8px 16px;font-size:13px;margin-top:4px">生成 PDF</button>
          <div id="pdf-status" style="margin-top:12px;font-size:13px;color:#888"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/spa-utils.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
