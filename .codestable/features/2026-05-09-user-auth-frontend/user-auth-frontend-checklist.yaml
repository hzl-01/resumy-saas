feature: 2026-05-09-user-auth-frontend
created: 2026-05-09

steps:
  - action: "静态文件服务：在 server.ts 添加 handleStaticRoute() 读取 src/web/static/ 下的文件"
    exit_signal: "浏览器访问 http://localhost:3000/ 返回 index.html 内容"
    status: done

  - action: "SPA 骨架 + login 视图：index.html 三视图占位 + spa-utils.js 工具函数 + app.js init() 检查 token"
    exit_signal: "打开页面看到登录表单，可输入并提交"
    status: done

  - action: "Register 视图：注册表单 + 提交逻辑 + POST /api/auth/register"
    exit_signal: "填写 email/password/name → 注册成功 → 自动登录 → dashboard"
    status: done

  - action: "Dashboard + logout：显示用户名称 + 登出按钮"
    exit_signal: "登录后看到'你好，{name}' + 登出按钮 → 点击后回到 login"
    status: done

  - action: "样式打磨：style.css 美化，全局配色，表单聚焦、错误提示"
    exit_signal: "页面视觉基本可用，与 CLI 风格协调"
    status: done

